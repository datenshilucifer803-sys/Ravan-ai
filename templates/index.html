<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>RAVAN AI 👹</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #header { background: #ff3300; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid gold; position: fixed; top: 0; width: 100%; z-index: 1000; }
        #menu-overlay { display: none; position: fixed; top: 0; right: 0; width: 250px; height: 100%; background: #080808; z-index: 2000; border-left: 1px solid #ff3300; padding: 20px; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }
        .menu-item { color: #ff3300; padding: 15px 0; border-bottom: 1px solid #222; font-size: 12px; cursor: pointer; }
        #chat-box { height: 70vh; overflow-y: auto; padding: 20px; padding-top: 60px; margin-bottom: 150px; }
        .msg { margin-bottom: 20px; font-size: 14px; }
        .ai { color: #ff3300; border-left: 3px solid #ff3300; padding-left: 10px; }
        .king-reply { background: #1a1a00; color: gold; border: 1px solid gold; padding: 15px; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #222; box-sizing: border-box; }
        input { background: #0a0a0a; color: #ff3300; border: 1px solid #333; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #111; border: 1px solid #222; color: #666; padding: 12px; font-size: 10px; text-align: center; }
        #admin-panel { display: none; background: #050505; border: 1px solid red; margin: 10px; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="header">
    <span style="font-weight:bold; letter-spacing:2px;">RAVAN AI</span>
    <span onclick="toggleMenu()" style="font-size:20px; cursor:pointer;">☰</span>
</div>

<div id="menu-overlay">
    <h3 style="color:red; margin-top:0;">COMMANDS</h3>
    <div class="menu-item" onclick="send('kundli')">📜 LIVE KUNDLI</div>
    <div class="menu-item" onclick="send('zodiac')">♈ LIVE ZODIAC</div>
    <div class="menu-item" onclick="startSoulScan()">✋ SOUL MIRROR</div>
    <div class="menu-item" onclick="alert('Admin: Reply PRIME to unlock users.')">👑 ADMIN HELP</div>
    <div class="menu-item" onclick="toggleMenu()" style="color:white; margin-top:50px;">✖ CLOSE</div>
</div>

<div id="login-screen" style="padding: 150px 30px; text-align: center;">
    <h1 style="color:red; font-size: 50px;">RAVAN</h1>
    <input type="number" id="phone" placeholder="PHONE NUMBER">
    <br><br>
    <button onclick="login()" style="background:red; color:white; border:none; padding:15px 50px;">ENTER</button>
</div>

<div id="app-area" style="display:none;">
    <div id="chat-box"></div>
    <div id="admin-panel">
        <h4 style="color:red;">GOD EYE PANEL</h4>
        <div id="query-list"></div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="COMMAND...">
        <div class="grid">
            <div class="btn" onclick="send('ask_ravan')">ASK RAVAN</div>
            <div class="btn" onclick="toggleMenu()">OPTIONS</div>
        </div>
    </div>
</div>

<video id="v" autoplay playsinline style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    function toggleMenu() {
        const m = document.getElementById('menu-overlay');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    async function login() {
        const ph = document.getElementById('phone').value;
        const key = prompt("SECRET KEY:");
        const res = await fetch('/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: ph, key: key}) });
        const data = await res.json();
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-area').style.display = 'block';
        if(data.isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            setInterval(updateAdmin, 5000);
        }
        setInterval(checkUpdates, 3000);
    }

    async function send(act) {
        toggleMenu();
        const txt = document.getElementById('userInput').value;
        const chat = document.getElementById('chat-box');
        chat.innerHTML += `<div class="msg"><b>YOU:</b> ${txt || act}</div>`;
        const res = await fetch('/process', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: act, message: txt}) });
        const data = await res.json();
        chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
        document.getElementById('userInput').value = "";
    }

    async function checkUpdates() {
        const res = await fetch('/check_updates');
        const data = await res.json();
        if(data.has_reply) {
            document.getElementById('chat-box').innerHTML += `<div class="msg king-reply">👑 **RAVAN:** ${data.reply}</div>`;
        }
    }

    async function updateAdmin() {
        const res = await fetch('/admin/data');
        const data = await res.json();
        const list = document.getElementById('query-list');
        list.innerHTML = "";
        data.queries.forEach(q => {
            list.innerHTML += `<div><b>${q.phone}:</b> ${q.query}<br><input id="ans-${q.phone}"><button onclick="adminReply('${q.phone}')">SEND</button></div><hr>`;
        });
    }

    async function adminReply(t) {
        const r = document.getElementById(`ans-${t}`).value;
        await fetch('/admin/reply', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({target: t, reply: r}) });
    }
</script>
</body>
</html>
